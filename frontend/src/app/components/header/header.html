<header class="header">
  <div class="section1">
    <h1 [class.golden-title]="isLoggedIn">VerlisShop</h1>
  </div>
  <div class="section2">
    @if (!isLoggedIn) {
      <button class="login" (click)="onLogin()">Iniciar Sesión</button>
      <button class="register" (click)="onRegister()">Registrarse</button>
    } @else {
      @if (currentUser?.role === 'admin') {
        <button class="login">Historial de ventas</button>
        <button class="login">Modificar usuario</button>
        <button class="login">Crear producto</button>
        <button class="login">Modificar producto</button>

        <div class="user-block clickable-user" (click)="navigateToProfile()" title="Ver Info del usuario">
          <div class="user-avatar">
            @if (currentUser?.avatar) {
              <img [src]="currentUser.avatar" alt="Avatar" class="user-avatar-img" />
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            }
          </div>
          <span class="user-name">Admin: {{ currentUser?.nombres }}</span>
        </div>
        <button class="logout" (click)="onLogout()">Cerrar sesión</button>
      } @else {
        <div class="user-block clickable-user" (click)="navigateToProfile()" title="Ver Info del usuario">
          <div class="user-avatar">
            @if (currentUser?.avatar) {
              <img [src]="currentUser.avatar" alt="Avatar" class="user-avatar-img" />
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            }
          </div>
          <span class="user-name">{{ currentUser?.nombres }} {{ currentUser?.apellidos }}</span>
        </div>

        <button class="icon-btn cart-btn" title="Carrito de compras">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
        </button>

        <button class="text-btn outline" (click)="navigateToHelp()">Ayuda</button>
        <button class="logout" (click)="onLogout()">Cerrar sesión</button>
      }
    }
  </div>
</header>
